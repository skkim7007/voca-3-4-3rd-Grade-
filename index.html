<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 즐거운 영단어 학습 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFB7B2;
            --secondary: #E2F0CB;
            --accent: #FFDAC1;
            --text: #555;
            --bg: #F7FBFC;
        }
        body {
            font-family: 'Jua', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #FF9AA2;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            color: var(--text);
        }
        button:hover {
            transform: translateY(-2px);
            background-color: var(--accent);
        }
        button.active {
            background-color: var(--primary);
            color: white;
        }
        
        /* Container */
        #content-area {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        /* Flashcards (Learn) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .flashcard {
            background-color: transparent;
            width: 100%;
            height: 100px;
            perspective: 1000px;
            cursor: pointer;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            padding: 10px;
            box-sizing: border-box;
            word-break: keep-all;
        }
        .flashcard-front {
            background-color: var(--secondary);
            color: #333;
        }
        .flashcard-back {
            background-color: var(--accent);
            color: #333;
            transform: rotateY(180deg);
        }

        /* Quiz */
        .quiz-container {
            font-size: 1.5rem;
        }
        .quiz-question {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #C7CEEA;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .quiz-options button {
            display: block;
            width: 80%;
            margin: 10px auto;
            background-color: var(--secondary);
        }
        .quiz-options button:hover {
            background-color: #B5EAD7;
        }
        .quiz-result {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #FF9AA2;
        }

        /* Game (Matching) */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        .game-card {
            background-color: var(--primary);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            color: transparent;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .game-card.revealed {
            background-color: white;
            color: var(--text);
            border: 2px solid var(--primary);
        }
        .game-card.matched {
            background-color: var(--secondary);
            color: var(--text);
            visibility: hidden; /* Option to hide or just keep open */
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>🎈 즐거운 영단어 학습 🎈</h1>

    <div class="controls">
        <button id="btn-lesson3" class="active" onclick="setLesson(3)">📘 3과 단어</button>
        <button id="btn-lesson4" onclick="setLesson(4)">📙 4과 단어</button>
    </div>

    <div class="controls">
        <button id="btn-learn" class="active" onclick="setMode('learn')">📖 학습하기</button>
        <button id="btn-quiz" onclick="setMode('quiz')">🤔 퀴즈풀기</button>
        <button id="btn-game" onclick="setMode('game')">🎮 게임하기</button>
    </div>

    <div id="content-area">
        </div>

    <script>
        const words = {
            lesson3: [
                {en: "worry", ko: "걱정하다, 고민"}, {en: "spend", ko: "소비하다"}, {en: "spender", ko: "소비자"},
                {en: "save", ko: "저축하다"}, {en: "habit", ko: "습관"}, {en: "while", ko: "~하는 반면, ~하는 동안"},
                {en: "allowance", ko: "용돈"}, {en: "result", ko: "결과"}, {en: "survey", ko: "조사"},
                {en: "effort", ko: "노력"}, {en: "divide A into B", ko: "A를 B로 나누다"}, {en: "majority", ko: "대부분, 대다수"},
                {en: "use up", ko: "다 써버리다"}, {en: "solve", ko: "해결하다"}, {en: "share", ko: "나누다"},
                {en: "carry", ko: "운반하다"}, {en: "weekly", ko: "매주의"}, {en: "donate", ko: "기부하다"},
                {en: "for example", ko: "예를 들어"}, {en: "manage", ko: "관리하다"}, {en: "charity", ko: "자선 단체"},
                {en: "budget", ko: "예산"}, {en: "have difficulty (in) ~ing", ko: "~하는데 어려움을 겪다"}, {en: "follow", ko: "따르다"},
                {en: "remaining", ko: "남아있는"}, {en: "tight", ko: "빠듯한"}, {en: "although", ko: "비록 ~일지라도"},
                {en: "even if", ko: "비록 ~일지라도"}, {en: "on sale", ko: "할인 중인"}, {en: "on the spot", ko: "즉석에서, 그 자리에서"}
            ],
            lesson4: [
                {en: "shampoo", ko: "샴푸"}, {en: "massage", ko: "마사지, 안마"}, {en: "experience", ko: "경험하다"},
                {en: "explorer", ko: "탐험가"}, {en: "trader", ko: "상인, 무역상"}, {en: "civilization", ko: "문명"},
                {en: "origin", ko: "기원, 유래"}, {en: "originate from", ko: "~에서 유래되다"}, {en: "originally", ko: "원래"},
                {en: "press", ko: "누르다"}, {en: "century", ko: "세기, 100년"}, {en: "present", ko: "현재의"},
                {en: "Spain", ko: "스페인"}, {en: "Spanish", ko: "스페인의, 스페인어"}, {en: "Britain", ko: "영국"},
                {en: "British", ko: "영국의, 영국 영어"}, {en: "Germany", ko: "독일"}, {en: "German", ko: "독일의, 독일어"},
                {en: "Czech", ko: "체코의, 체코어"}, {en: "Mayan", ko: "마야의"}, {en: "Hindi", ko: "힌디어"},
                {en: "slave", ko: "노예"}, {en: "suggest", ko: "제안하다"}, {en: "universe", ko: "우주, 은하계"},
                {en: "flood", ko: "홍수"}, {en: "hurricane", ko: "허리케인"}, {en: "contact", ko: "접촉"},
                {en: "anger", ko: "화나게 하다"}, {en: "pass through", ko: "~을 통과하다"}, {en: "pick up", ko: "(정보를) 알게 되다"},
                {en: "law", ko: "법"}, {en: "shortly", ko: "곧"}, {en: "creation", ko: "창조"},
                {en: "factory", ko: "공장"}, {en: "produce", ko: "생산하다"}, {en: "myth", ko: "신화"}
            ]
        };

        let currentLesson = 3;
        let currentMode = 'learn';

        // Quiz State
        let quizWords = [];
        let currentQuizIndex = 0;
        let score = 0;

        // Game State
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matchedPairs = 0;

        function setLesson(lesson) {
            currentLesson = lesson;
            document.getElementById('btn-lesson3').classList.toggle('active', lesson === 3);
            document.getElementById('btn-lesson4').classList.toggle('active', lesson === 4);
            renderContent();
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-learn').classList.toggle('active', mode === 'learn');
            document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
            document.getElementById('btn-game').classList.toggle('active', mode === 'game');
            renderContent();
        }

        function getWordList() {
            return currentLesson === 3 ? words.lesson3 : words.lesson4;
        }

        function renderContent() {
            const area = document.getElementById('content-area');
            area.innerHTML = '';

            if (currentMode === 'learn') {
                renderLearnMode(area);
            } else if (currentMode === 'quiz') {
                startQuiz(area);
            } else if (currentMode === 'game') {
                startGame(area);
            }
        }

        // --- LEARN MODE ---
        function renderLearnMode(area) {
            const list = getWordList();
            const grid = document.createElement('div');
            grid.className = 'grid-container';
            
            list.forEach(word => {
                const card = document.createElement('div');
                card.className = 'flashcard';
                card.onclick = () => card.classList.toggle('flipped');
                
                card.innerHTML = `
                    <div class="flashcard-inner">
                        <div class="flashcard-front">${word.en}</div>
                        <div class="flashcard-back">${word.ko}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            area.appendChild(grid);
        }

        // --- QUIZ MODE ---
        function startQuiz(area) {
            const list = [...getWordList()];
            quizWords = list.sort(() => 0.5 - Math.random()).slice(0, 10); // 10문제 출제
            currentQuizIndex = 0;
            score = 0;
            renderQuizQuestion(area);
        }

        function renderQuizQuestion(area) {
            area.innerHTML = '';
            if (currentQuizIndex >= quizWords.length) {
                area.innerHTML = `<h2>🎉 퀴즈 완료! 🎉</h2><div class="quiz-result">10문제 중 ${score}문제를 맞췄어요!</div><button onclick="startQuiz(document.getElementById('content-area'))">다시 하기</button>`;
                return;
            }

            const currentWord = quizWords[currentQuizIndex];
            const list = getWordList();
            
            // Generate wrong answers
            let options = [currentWord.ko];
            while (options.length < 4) {
                const randomWord = list[Math.floor(Math.random() * list.length)].ko;
                if (!options.includes(randomWord)) options.push(randomWord);
            }
            options = options.sort(() => 0.5 - Math.random()); // Shuffle

            area.innerHTML = `
                <div class="quiz-container">
                    <p>문제 ${currentQuizIndex + 1} / 10</p>
                    <div class="quiz-question">${currentWord.en}</div>
                    <div class="quiz-options">
                        ${options.map(opt => `<button onclick="checkAnswer('${opt}', '${currentWord.ko}')">${opt}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                score++;
                alert("정답입니다! 🥳");
            } else {
                alert(`틀렸어요! 😢 정답은 '${correct}' 입니다.`);
            }
            currentQuizIndex++;
            renderQuizQuestion(document.getElementById('content-area'));
        }

        // --- GAME MODE (카드 짝맞추기) ---
        function startGame(area) {
            matchedPairs = 0;
            const list = getWordList();
            // 게임에 사용할 단어 8개 랜덤 선택
            let gameWords = [...list].sort(() => 0.5 - Math.random()).slice(0, 8);
            
            let cardsArray = [];
            gameWords.forEach((word, index) => {
                cardsArray.push({ id: index, text: word.en, type: 'en' });
                cardsArray.push({ id: index, text: word.ko, type: 'ko' });
            });
            
            cardsArray = cardsArray.sort(() => 0.5 - Math.random()); // 셔플

            area.innerHTML = '<h2>카드 짝맞추기 게임 🃏</h2><p>영어 단어와 알맞은 뜻을 찾아 클릭하세요!</p>';
            const board = document.createElement('div');
            board.className = 'game-board';

            cardsArray.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.dataset.id = item.id;
                card.dataset.type = item.type;
                card.dataset.index = index;
                card.innerText = item.text;
                card.onclick = () => flipGameCard(card);
                board.appendChild(card);
            });

            area.appendChild(board);
        }

        function flipGameCard(card) {
            if (lockBoard) return;
            if (card === firstCard) return;
            if (card.classList.contains('matched')) return;

            card.classList.add('revealed');

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id && firstCard.dataset.type !== secondCard.dataset.type;

            if (isMatch) {
                disableCards();
                matchedPairs++;
                if (matchedPairs === 8) {
                    setTimeout(() => alert("축하합니다! 모든 카드를 맞췄어요! 🎊"), 500);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('revealed');
                secondCard.classList.remove('revealed');
                resetBoard();
            }, 1000); // 1초 후 뒤집힘
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        // 초기 실행
        renderContent();
    </script>
</body>
</html>
