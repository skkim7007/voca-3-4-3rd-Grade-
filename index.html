<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 즐거운 영단어 학습 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9EAA; /* 솜사탕 핑크 */
            --secondary: #C1E1C1; /* 민트 그린 */
            --accent: #FFDFD3; /* 피치 */
            --text: #555;
            --bg-start: #fdfbfb;
            --bg-end: #ebedee;
            --danger: #FF9AA2;
            --success: #B5EAD7;
        }
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        h1 {
            color: #FF7B89;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(255,123,137,0.2);
            margin: 15px 0 25px 0;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .controls, .sub-controls {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .sub-controls {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto 20px auto;
            border: 2px solid white;
        }
        button {
            font-family: 'Jua', sans-serif;
            font-size: 1.1rem;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: var(--text);
            border: 2px solid transparent;
        }
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 7px 14px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }
        button.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 158, 170, 0.4);
        }
        
        /* 메인 컨텐츠 영역 */
        #content-area {
            max-width: 800px;
            margin: 0 auto;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            min-height: 400px;
            position: relative;
            border: 2px solid white;
        }

        /* 1. 학습하기 (전체) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }
        .flashcard {
            background-color: transparent;
            width: 100%;
            height: 110px;
            perspective: 1000px;
            cursor: pointer;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard:hover .flashcard-inner {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            font-size: 1.25rem;
            padding: 10px;
            box-sizing: border-box;
            word-break: keep-all;
            border: 2px solid white;
        }
        .flashcard-front {
            background: linear-gradient(135deg, #e0f2ce 0%, #c1e1c1 100%);
            color: #444;
        }
        .flashcard-back {
            background: linear-gradient(135deg, #ffe5d4 0%, #ffdfd3 100%);
            color: #444;
            transform: rotateY(180deg);
        }

        /* 2. 학습하기 (한 단어) */
        .single-card-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            height: 300px;
        }
        .single-card {
            width: 320px;
            height: 220px;
            font-size: 2.2rem;
        }
        .nav-btn {
            font-size: 2.5rem;
            background: none;
            box-shadow: none;
            color: var(--primary);
            padding: 10px;
            border: none;
        }
        .nav-btn:hover {
            background: rgba(255, 158, 170, 0.1);
            transform: scale(1.15);
            border-color: transparent;
        }

        /* 3. 퀴즈 */
        .quiz-container {
            font-size: 1.5rem;
        }
        .quiz-question {
            margin-bottom: 25px;
            font-size: 2.5rem;
            color: #7B8CA6;
            text-shadow: 1px 1px 0px white;
        }
        .quiz-options button {
            display: block;
            width: 75%;
            margin: 12px auto;
            background: white;
            border: 2px solid var(--secondary);
            font-size: 1.3rem;
            padding: 15px;
        }
        .quiz-options button:hover {
            background-color: var(--secondary);
            color: white;
        }

        /* 4. 타자 게임 (떨어지는 단어) */
        .type-game-container {
            position: relative;
            width: 100%;
            height: 420px;
            background: repeating-linear-gradient(45deg, #f0f8ff, #f0f8ff 15px, #e6f3ff 15px, #e6f3ff 30px);
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--secondary);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        .type-header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 1.3rem;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(5px);
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            border-bottom: 2px solid white;
        }
        .falling-word {
            position: absolute;
            font-size: 1.4rem;
            background-color: white;
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            color: #333;
            transition: transform 0.2s, background-color 0.3s;
            border: 2px solid var(--primary);
            white-space: nowrap;
        }
        .type-input-area {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            display: flex;
            gap: 10px;
        }
        #type-input {
            flex-grow: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 3px solid var(--primary);
            font-family: 'Jua', sans-serif;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: border-color 0.3s;
        }
        #type-input:focus {
            border-color: #FF7B89;
        }
        .game-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .game-overlay button {
            font-size: 1.5rem; 
            padding: 15px 40px;
            background-color: var(--primary);
            color: white;
            border: none;
        }

        /* 5. 카드 짝맞추기 게임 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .game-card {
            background: linear-gradient(135deg, var(--primary) 0%, #FF9AA2 100%);
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
            color: transparent;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0.2, 0.2, 1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            word-break: keep-all;
            padding: 5px;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }
        .game-card.revealed {
            background: white;
            color: var(--text);
            border: 3px solid var(--primary);
            transform: scale(1.02);
        }
        .game-card.matched {
            background: var(--secondary);
            color: #666;
            opacity: 0.6;
            cursor: default;
            transform: scale(0.95);
            border-color: transparent;
        }

        /* 로그인 (학번/이름 입력) 오버레이 */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 3px solid var(--primary);
            text-align: center;
        }
        .login-box input {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 12px;
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            border: 2px solid var(--secondary);
            border-radius: 15px;
            text-align: center;
        }
        .login-box button {
            margin-top: 20px;
            background-color: var(--primary);
            color: white;
            font-size: 1.3rem;
            padding: 12px 30px;
        }
        
        /* 모바일 대응 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .single-card { width: 240px; height: 160px; font-size: 1.6rem; }
            .game-board { grid-template-columns: repeat(3, 1fr); }
            .quiz-options button { width: 95%; }
            #content-area { padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- 학생 정보 입력 창 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--primary); margin-bottom: 10px;">👋 반가워요!</h2>
            <p style="color: var(--text); margin-bottom: 25px;">학습을 시작하기 전에<br>학번과 이름을 입력해주세요.</p>
            <input type="text" id="input-student-id" placeholder="예: 10101 (학번)">
            <input type="text" id="input-student-name" placeholder="예: 홍길동 (이름)">
            <button onclick="startSession()">학습 시작하기 🚀</button>
        </div>
    </div>

    <h1>🎈 즐거운 영단어 학습 🎈</h1>

    <!-- 과 선택 -->
    <div class="controls">
        <button id="btn-lesson3" class="active" onclick="setLesson(3)">📘 3과 단어</button>
        <button id="btn-lesson4" onclick="setLesson(4)">📙 4과 단어</button>
    </div>

    <!-- 모드 선택 -->
    <div class="sub-controls">
        <button id="btn-learn-all" class="active" onclick="setMode('learn-all')">📖 전체 학습</button>
        <button id="btn-learn-single" onclick="setMode('learn-single')">📇 한 단어 학습</button>
        <button id="btn-quiz" onclick="setMode('quiz')">🤔 객관식 퀴즈</button>
        <button id="btn-game-type" onclick="setMode('game-type')">⌨️ 타자 게임</button>
        <button id="btn-game-match" onclick="setMode('game-match')">🃏 카드 맞추기</button>
    </div>

    <div id="content-area">
        <!-- 컨텐츠가 여기에 렌더링됩니다 -->
    </div>

    <script>
        const words = {
            lesson3: [
                {en: "worry", ko: "걱정하다, 고민"}, {en: "spend", ko: "소비하다"}, {en: "spender", ko: "소비자"},
                {en: "save", ko: "저축하다"}, {en: "habit", ko: "습관"}, {en: "while", ko: "~하는 반면, ~하는 동안"},
                {en: "allowance", ko: "용돈"}, {en: "result", ko: "결과"}, {en: "survey", ko: "조사"},
                {en: "effort", ko: "노력"}, {en: "divide A into B", ko: "A를 B로 나누다"}, {en: "majority", ko: "대부분, 대다수"},
                {en: "use up", ko: "다 써버리다"}, {en: "solve", ko: "해결하다"}, {en: "share", ko: "나누다"},
                {en: "carry", ko: "운반하다"}, {en: "weekly", ko: "매주의"}, {en: "donate", ko: "기부하다"},
                {en: "for example", ko: "예를 들어"}, {en: "manage", ko: "관리하다"}, {en: "charity", ko: "자선 단체"},
                {en: "budget", ko: "예산"}, {en: "have difficulty (in) ~ing", ko: "~하는데 어려움을 겪다"}, {en: "follow", ko: "따르다"},
                {en: "remaining", ko: "남아있는"}, {en: "tight", ko: "빠듯한"}, {en: "although", ko: "비록 ~일지라도"},
                {en: "even if", ko: "비록 ~일지라도"}, {en: "on sale", ko: "할인 중인"}, {en: "on the spot", ko: "즉석에서, 그 자리에서"}
            ],
            lesson4: [
                {en: "shampoo", ko: "샴푸"}, {en: "massage", ko: "마사지, 안마"}, {en: "experience", ko: "경험하다"},
                {en: "explorer", ko: "탐험가"}, {en: "trader", ko: "상인, 무역상"}, {en: "civilization", ko: "문명"},
                {en: "origin", ko: "기원, 유래"}, {en: "originate from", ko: "~에서 유래되다"}, {en: "originally", ko: "원래"},
                {en: "press", ko: "누르다"}, {en: "century", ko: "세기, 100년"}, {en: "present", ko: "현재의"},
                {en: "Spain", ko: "스페인"}, {en: "Spanish", ko: "스페인의, 스페인어"}, {en: "Britain", ko: "영국"},
                {en: "British", ko: "영국의, 영국 영어"}, {en: "Germany", ko: "독일"}, {en: "German", ko: "독일의, 독일어"},
                {en: "Czech", ko: "체코의, 체코어"}, {en: "Mayan", ko: "마야의"}, {en: "Hindi", ko: "힌디어"},
                {en: "slave", ko: "노예"}, {en: "suggest", ko: "제안하다"}, {en: "universe", ko: "우주, 은하계"},
                {en: "flood", ko: "홍수"}, {en: "hurricane", ko: "허리케인"}, {en: "contact", ko: "접촉"},
                {en: "anger", ko: "화나게 하다"}, {en: "pass through", ko: "~을 통과하다"}, {en: "pick up", ko: "(정보를) 알게 되다"},
                {en: "law", ko: "법"}, {en: "shortly", ko: "곧"}, {en: "creation", ko: "창조"},
                {en: "factory", ko: "공장"}, {en: "produce", ko: "생산하다"}, {en: "myth", ko: "신화"}
            ]
        };

        let currentLesson = 3;
        let currentMode = 'learn-all';

        // 단일 학습 상태
        let singleCardIndex = 0;

        // 퀴즈 상태
        let quizWords = [];
        let currentQuizIndex = 0;
        let score = 0;

        // 짝맞추기 게임 상태
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matchedPairs = 0;

        // 타자 게임 상태
        let typeGameInterval;
        let spawnInterval;
        let fallingWords = [];
        let typeScore = 0;
        let typeLives = 5;
        let isTypeGameRunning = false;

        // --- 구글 시트 연동 설정 ---
        let studentId = '';
        let studentName = '';
        
        // ⚠️ 여기에 아래 설명에 따라 발급받은 '구글 앱스 스크립트 웹앱 URL'을 붙여넣으세요.
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzN38qLRHxgvwwbJzsqE9ozAv8oj7npJAUVIqT2W5m_fVZPMtEcVAvQHeHJ_MII5RxDaA/exec'; 

        function startSession() {
            const idInput = document.getElementById('input-student-id').value.trim();
            const nameInput = document.getElementById('input-student-name').value.trim();

            if (!idInput || !nameInput) {
                alert('학번과 이름을 모두 입력해주세요! 🥺');
                return;
            }

            studentId = idInput;
            studentName = nameInput;
            document.getElementById('login-overlay').style.display = 'none';
            alert(`${studentName} 학생, 환영합니다! 열심히 학습해봐요! 🎉`);
        }

        function sendResultToSheet(activity, score, total) {
            if (!SCRIPT_URL || SCRIPT_URL === '') {
                alert("선생님이 아직 결과를 모으는 설정을 하지 않으셨습니다.\n(내 점수: " + score + " / " + total + ")");
                return;
            }

            const btn = document.getElementById('btn-submit-result');
            if(btn) {
                btn.innerText = '전송 중... ⏳';
                btn.disabled = true;
            }

            const data = {
                studentId: studentId,
                studentName: studentName,
                lesson: currentLesson,
                activity: activity,
                score: score,
                total: total,
                timestamp: new Date().toLocaleString()
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                }
            })
            .then(response => {
                alert("결과가 성공적으로 선생님께 전송되었습니다! ✅");
                if(btn) btn.innerText = '전송 완료! ✨';
            })
            .catch(error => {
                console.error('Error:', error);
                alert("결과 전송 중 오류가 발생했습니다. 다시 시도해주세요. ❌");
                if(btn) {
                    btn.innerText = '결과 전송하기 🚀';
                    btn.disabled = false;
                }
            });
        }

        function getWordList() {
            return currentLesson === 3 ? words.lesson3 : words.lesson4;
        }

        // --- 공통 제어 ---
        function setLesson(lesson) {
            currentLesson = lesson;
            document.getElementById('btn-lesson3').classList.toggle('active', lesson === 3);
            document.getElementById('btn-lesson4').classList.toggle('active', lesson === 4);
            singleCardIndex = 0; // 과 변경시 첫 단어로 초기화
            renderContent();
        }

        function setMode(mode) {
            cleanupGames(); // 다른 모드로 갈 때 게임 초기화
            currentMode = mode;
            document.querySelectorAll('.sub-controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            renderContent();
        }

        function cleanupGames() {
            isTypeGameRunning = false;
            cancelAnimationFrame(typeGameInterval);
            clearInterval(spawnInterval);
            fallingWords = [];
        }

        function renderContent() {
            const area = document.getElementById('content-area');
            area.innerHTML = '';

            switch(currentMode) {
                case 'learn-all': renderLearnAll(area); break;
                case 'learn-single': renderLearnSingle(area); break;
                case 'quiz': startQuiz(area); break;
                case 'game-type': renderTypeGameInit(area); break;
                case 'game-match': startMatchGame(area); break;
            }
        }

        // --- 1. 학습하기 (전체) ---
        function renderLearnAll(area) {
            const list = getWordList();
            const grid = document.createElement('div');
            grid.className = 'grid-container';
            
            list.forEach(word => {
                const card = document.createElement('div');
                card.className = 'flashcard';
                card.onclick = () => card.classList.toggle('flipped');
                
                card.innerHTML = `
                    <div class="flashcard-inner">
                        <div class="flashcard-front">${word.en}</div>
                        <div class="flashcard-back">${word.ko}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            area.appendChild(grid);
        }

        // --- 2. 학습하기 (한 단어) ---
        function renderLearnSingle(area) {
            const list = getWordList();
            const word = list[singleCardIndex];
            
            area.innerHTML = `
                <p>${singleCardIndex + 1} / ${list.length}</p>
                <div class="single-card-container">
                    <button class="nav-btn" onclick="changeSingleCard(-1)">◀</button>
                    <div class="flashcard single-card" onclick="this.classList.toggle('flipped')">
                        <div class="flashcard-inner">
                            <div class="flashcard-front">${word.en}</div>
                            <div class="flashcard-back">${word.ko}</div>
                        </div>
                    </div>
                    <button class="nav-btn" onclick="changeSingleCard(1)">▶</button>
                </div>
                <p style="color:#888; font-size:0.9rem;">(카드를 클릭하면 뜻이 보입니다)</p>
            `;
        }

        function changeSingleCard(dir) {
            const list = getWordList();
            singleCardIndex += dir;
            if (singleCardIndex < 0) singleCardIndex = list.length - 1;
            if (singleCardIndex >= list.length) singleCardIndex = 0;
            renderLearnSingle(document.getElementById('content-area'));
        }

        // --- 3. 퀴즈 풀기 ---
        function startQuiz(area) {
            const list = [...getWordList()];
            quizWords = list.sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQuizIndex = 0;
            score = 0;
            renderQuizQuestion(area);
        }

        function renderQuizQuestion(area) {
            area.innerHTML = '';
            if (currentQuizIndex >= quizWords.length) {
                area.innerHTML = `<h2>🎉 퀴즈 완료! 🎉</h2>
                                  <div style="font-size:1.5rem; margin:20px;">10문제 중 ${score}문제를 맞췄어요!</div>
                                  <button id="btn-submit-result" onclick="sendResultToSheet('객관식 퀴즈', ${score}, 10)" style="background:var(--primary); color:white; margin-bottom:15px; width: auto; font-size: 1.2rem;">선생님께 결과 전송하기 🚀</button><br>
                                  <button onclick="startQuiz(document.getElementById('content-area'))">다시 하기</button>`;
                return;
            }

            const currentWord = quizWords[currentQuizIndex];
            const list = getWordList();
            
            let options = [currentWord.ko];
            while (options.length < 4) {
                const randomWord = list[Math.floor(Math.random() * list.length)].ko;
                if (!options.includes(randomWord)) options.push(randomWord);
            }
            options = options.sort(() => 0.5 - Math.random());

            area.innerHTML = `
                <div class="quiz-container">
                    <p>문제 ${currentQuizIndex + 1} / 10</p>
                    <div class="quiz-question">${currentWord.en}</div>
                    <div class="quiz-options">
                        ${options.map(opt => `<button onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', '${currentWord.ko.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                score++;
                alert("정답입니다! 🥳");
            } else {
                alert(`틀렸어요! 😢 정답은 '${correct}' 입니다.`);
            }
            currentQuizIndex++;
            renderQuizQuestion(document.getElementById('content-area'));
        }

        // --- 4. 타자 게임 (떨어지는 단어) ---
        function renderTypeGameInit(area) {
            area.innerHTML = `
                <h2>⌨️ 영어 타자 방어 게임</h2>
                <p>위에서 떨어지는 한글 뜻을 보고,<br>알맞은 <strong>영어 단어</strong>를 입력해 방어하세요!</p>
                <div class="type-game-container" id="type-game-container">
                    <div class="game-overlay" id="type-overlay">
                        <button style="font-size:1.5rem; padding: 15px 30px;" onclick="startTypeGame()">게임 시작</button>
                    </div>
                    <div class="type-header">
                        <span id="type-score-display">점수: 0</span>
                        <span id="type-lives-display">❤️❤️❤️❤️❤️</span>
                    </div>
                    <!-- 단어들이 떨어질 공간 -->
                    <div class="type-input-area">
                        <input type="text" id="type-input" placeholder="여기에 영어 단어 입력..." disabled autocomplete="off">
                    </div>
                </div>
            `;
        }

        function startTypeGame() {
            document.getElementById('type-overlay').style.display = 'none';
            const input = document.getElementById('type-input');
            input.disabled = false;
            input.focus();
            input.value = '';
            
            typeScore = 0;
            typeLives = 5;
            fallingWords = [];
            isTypeGameRunning = true;
            updateTypeUI();

            // 입력 이벤트 (엔터키 확인)
            input.onkeyup = function(e) {
                if (e.key === 'Enter') {
                    checkTypedWord(this.value.trim().toLowerCase());
                    this.value = '';
                }
            };

            // 단어 생성 인터벌
            spawnInterval = setInterval(spawnWord, 500);
            
            // 게임 루프 시작
            lastTime = performance.now();
            requestAnimationFrame(typeGameLoop);
        }

        let lastTime = 0;
        function typeGameLoop(currentTime) {
            if (!isTypeGameRunning) return;
            
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            const container = document.getElementById('type-game-container');
            if(!container) return; // 화면 벗어남 방지
            
            const containerHeight = container.clientHeight - 60; // 입력창 높이 제외

            for (let i = fallingWords.length - 1; i >= 0; i--) {
                let fw = fallingWords[i];
                fw.y += fw.speed * (deltaTime / 16); // 60fps 기준 속도 보정
                fw.element.style.top = fw.y + 'px';

                // 바닥의 75% 지점을 지날 때 첫 알파벳 힌트 제공
                if (!fw.hintShown && fw.y > containerHeight * 0.75) {
                    fw.hintShown = true;
                    fw.element.innerText = `${fw.koText} (${fw.targetEn.charAt(0)}...)`;
                    fw.element.style.backgroundColor = '#FFDFD3'; // 약간 다급한 느낌의 피치색으로 변경
                    fw.element.style.transform = 'scale(1.05)';
                    fw.element.style.borderColor = '#FF9EAA';
                }

                // 바닥에 닿았을 때
                if (fw.y > containerHeight) {
                    fw.element.remove();
                    fallingWords.splice(i, 1);
                    typeLives--;
                    updateTypeUI();
                    
                    if (typeLives <= 0) {
                        gameOverTypeGame();
                        return;
                    }
                }
            }

            typeGameInterval = requestAnimationFrame(typeGameLoop);
        }

        function spawnWord() {
            if (!isTypeGameRunning) return;
            if (fallingWords.length > 0) return; // 화면에 단어가 있으면 생성하지 않음 (한 단어씩 떨어지게)
            
            const list = getWordList();
            const randomWord = list[Math.floor(Math.random() * list.length)];
            
            const container = document.getElementById('type-game-container');
            const el = document.createElement('div');
            el.className = 'falling-word';
            el.innerText = randomWord.ko;
            
            // 랜덤 X 위치 (좌우 여백 고려)
            const maxX = container.clientWidth - 150; 
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            
            el.style.left = randomX + 'px';
            el.style.top = '40px';
            container.appendChild(el);

            // 점수가 높을수록 속도 증가 (이전보다 증가폭을 줄임)
            const speedMultiplier = 1 + (typeScore / 200);
            
            fallingWords.push({
                element: el,
                targetEn: randomWord.en.toLowerCase(),
                koText: randomWord.ko, // 원래 한글 뜻 저장
                y: 40,
                speed: 0.3 * speedMultiplier, // 기본 속도를 늦춤
                hintShown: false // 힌트 제공 여부 플래그
            });
        }

        function checkTypedWord(typed) {
            for (let i = 0; i < fallingWords.length; i++) {
                if (fallingWords[i].targetEn === typed) {
                    // 단어 맞춤 (배열에서 먼저 분리하여 다른 단어가 지워지는 버그 방지)
                    const matched = fallingWords.splice(i, 1)[0];
                    matched.element.style.backgroundColor = 'var(--success)';
                    
                    setTimeout(() => {
                        if(matched.element) {
                            matched.element.remove();
                        }
                    }, 100);
                    
                    typeScore += 10;
                    updateTypeUI();
                    return; // 하나만 삭제
                }
            }
        }

        function updateTypeUI() {
            const scoreEl = document.getElementById('type-score-display');
            const livesEl = document.getElementById('type-lives-display');
            if(scoreEl) scoreEl.innerText = `점수: ${typeScore}`;
            if(livesEl) livesEl.innerText = '❤️'.repeat(typeLives) + '🖤'.repeat(5 - typeLives);
        }

        function gameOverTypeGame() {
            isTypeGameRunning = false;
            clearInterval(spawnInterval);
            document.getElementById('type-input').disabled = true;
            
            const overlay = document.getElementById('type-overlay');
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <h2 style="color:var(--danger)">게임 오버!</h2>
                <p style="font-size:1.5rem; margin-bottom:15px;">최종 점수: ${typeScore}점</p>
                <button id="btn-submit-result" onclick="sendResultToSheet('타자 게임', ${typeScore}, '점')" style="background:var(--primary); color:white; margin-bottom:10px; font-size:1.2rem; padding: 10px 20px;">선생님께 결과 전송하기 🚀</button>
                <button onclick="startTypeGame()" style="font-size:1.2rem; padding: 10px 20px;">다시 도전하기</button>
            `;
        }


        // --- 5. 카드 짝맞추기 게임 ---
        function startMatchGame(area) {
            matchedPairs = 0;
            const list = getWordList();
            let gameWords = [...list].sort(() => 0.5 - Math.random()).slice(0, 8); // 8쌍(16장)
            
            let cardsArray = [];
            gameWords.forEach((word, index) => {
                cardsArray.push({ id: index, text: word.en, type: 'en' });
                cardsArray.push({ id: index, text: word.ko, type: 'ko' });
            });
            
            cardsArray = cardsArray.sort(() => 0.5 - Math.random());

            area.innerHTML = '<h2>카드 짝맞추기 게임 🃏</h2><p style="margin-bottom:20px;">영어 단어와 알맞은 뜻을 찾아 짝을 맞추세요!</p>';
            const board = document.createElement('div');
            board.className = 'game-board';

            cardsArray.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'game-card flashcard'; 
                card.dataset.id = item.id;
                card.dataset.type = item.type;
                
                card.innerText = item.text;
                card.onclick = () => flipMatchCard(card);
                board.appendChild(card);
            });

            area.appendChild(board);
        }

        function flipMatchCard(card) {
            if (lockBoard) return;
            if (card === firstCard) return;
            if (card.classList.contains('matched')) return;

            card.classList.add('revealed');

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id && firstCard.dataset.type !== secondCard.dataset.type;

            if (isMatch) {
                disableMatchCards();
                matchedPairs++;
                if (matchedPairs === 8) {
                    setTimeout(() => {
                        alert("축하합니다! 모든 카드를 맞췄어요! 🎊\n기억력이 대단하네요!");
                        if(confirm("이 결과를 선생님께 전송할까요?")) {
                            sendResultToSheet('카드 짝맞추기', '성공', '성공');
                        }
                    }, 500);
                }
            } else {
                unflipMatchCards();
            }
        }

        function disableMatchCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            resetMatchBoard();
        }

        function unflipMatchCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('revealed');
                secondCard.classList.remove('revealed');
                resetMatchBoard();
            }, 1000);
        }

        function resetMatchBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        // 페이지 최초 로드시 실행
        renderContent();
    </script>
</body>
</html>
